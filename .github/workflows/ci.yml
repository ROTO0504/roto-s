name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Panda CSS
        working-directory: apps/admin
        run: bunx panda codegen

      - name: Typecheck (api)
        working-directory: apps/api
        run: bunx tsc --noEmit

      - name: Typecheck (admin)
        working-directory: apps/admin
        run: bunx tsc -b --noEmit

      - name: Build admin SPA
        working-directory: apps/admin
        run: bunx vite build

      - name: Build Worker (dry-run)
        working-directory: apps/api
        run: bunx wrangler deploy --dry-run --outdir=/tmp/worker-bundle
